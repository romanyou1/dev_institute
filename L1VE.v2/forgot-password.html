<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L1VE - Mot de passe oublié</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="forgot">
    <main class="auth-shell">
      <section class="auth-card card">
        <div class="auth-toolbar">
          <a class="auth-brand" href="landing.html">
            <img src="assets/logo-l1ve-generic.svg" alt="Logo L1VE" />
          </a>
          <div class="language-panel" data-language-panel="forgot"></div>
        </div>
        <div>
          <p class="eyebrow" data-i18n="forgot.eyebrow">Récupération</p>
          <h1 data-i18n="forgot.title">Réinitialise ton mot de passe sans perdre ton élan.</h1>
          <p class="space-text" data-i18n="forgot.text">
            Entre ton email. On simule l’envoi d’un lien de réinitialisation pour que ton parcours reste complet côté front.
          </p>
        </div>
        <form id="forgotForm" class="compact-form">
          <label>
            <span data-i18n="forgot.email">Email</span>
            <input id="forgotEmail" type="email" placeholder="toi@exemple.com" data-i18n-placeholder="login.emailPlaceholder" required />
          </label>
          <button class="btn" type="submit" data-i18n="forgot.submit">Envoyer le lien</button>
        </form>
        <div class="auth-links">
          <a href="login.html" data-i18n="forgot.back">Retour à la connexion</a>
          <a href="register.html" data-i18n="login.register">Pas encore de compte ? S'inscrire</a>
        </div>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="app.js"></script>
  </body>
</html>
